services:
  db:
    image: postgres:16-alpine
    container_name: scaffold-postgres
    environment:
      POSTGRES_DB: scaffold
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d scaffold"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
